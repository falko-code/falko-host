name: falko
publish_to: none
environment:
  sdk: ">=3.13.0-0 <4.0.0"
workspace:
  - src/*
dev_dependencies:
  melos: ^8.0.0
  index_generator: ^4.1.2
melos:
  scripts:
    gen:
      description: Generate index/barrel files for all packages
      exec: dart pub global run index_generator -s ../../index_generator.yaml
